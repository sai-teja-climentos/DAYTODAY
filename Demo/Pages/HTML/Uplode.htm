<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Form</title>

<script src="/Pages/JS/index.js"></script>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#667eea,#764ba2);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:40px;
    border-radius:12px;
    width:350px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.container h2{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    font-size:14px;
    font-weight:bold;
    display:block;
    margin-bottom:6px;
}

.input-group input{
    width:100%;
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:14px;
    transition:0.3s;
}

.input-group input:focus{
    border-color:#667eea;
    outline:none;
    box-shadow:0 0 5px rgba(102,126,234,0.5);
}

.image-upload{
    text-align:center;
    margin-bottom:20px;
}

.image-upload input{
    border:none;
}

button{
    width:100%;
    padding:12px;
    background:#667eea;
    border:none;
    color:white;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#5a67d8;
}

</style>
</head>

<body>

<div class="container">

<h2>User Profile</h2>

<form onsubmit="UplodeForm()">
    
<div class="input-group">
<label>Full Name</label>
<input id="FullName" type="text" placeholder="Enter your name" required>
</div>

<div class="input-group">
<label>Email Address</label>
<input id="EmailAddress" type="email" placeholder="Enter your email" required>
</div>

<div class="input-group">
<label>Phone Number</label>
<input id="PhoneNumber" type="tel" placeholder="Enter phone number" required>
</div>

<button type="submit">Submit</button>

</form>

</div>

</body>
</html>

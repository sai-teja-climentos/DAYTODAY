<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Error Page</title>

<style>

body{
    margin:0;
    padding:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#ff4e50,#f9d423);
}

.error-container{
    text-align:center;
    background:white;
    padding:50px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    font-size:70px;
    color:#ff4e50;
    margin:0;
}

h2{
    color:#333;
}

p{
    color:#666;
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    background:#ff4e50;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#e13b3d;
}

</style>
</head>

<body>

<div class="error-container">
    <h1>404</h1>
    <h2>Oops! Page Not Found</h2>
    <p>Sorry, the page you are looking for does not exist.</p>
    <button onclick="location.href='index.html'">Go Back</button>
</div>

</body>

</html>

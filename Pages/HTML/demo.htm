<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Page</title>

<style>

body{
    margin:0;
    padding:0;
    font-family: Arial, Helvetica, sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.container{
    text-align:center;
    background:white;
    padding:50px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    font-size:40px;
    color:#333;
}

p{
    color:#666;
    font-size:18px;
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    background:#4facfe;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#2d8cf0;
}

</style>
</head>

<body>

<div class="container">
    <h1>Welcome 🎉</h1>
    <p>You have successfully logged in.</p>
    <button onclick="location.href='index.html'">Go to Home</button>
</div>

</body>
</html>

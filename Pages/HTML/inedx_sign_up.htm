<!DOCTYPE html>
<html>

<head>
    <title>Signup Form</title>

    <link rel="stylesheet" href="/Pages/CSS/index.css">
    <script src="/Pages/JS/index.js"></script>
</head>

<body>

    <div class="login-box">

        <h2>Signup Form</h2>

        <form onsubmit="SignupForm()">

            
            <input type="text" id="SignupUsername" placeholder="Create Username" >
            
            <input type="text" id="SignupPassword" placeholder="Create Password" >


            <button type="submit">Signup</button>

        </form>

    </div>

</body>

</html>
